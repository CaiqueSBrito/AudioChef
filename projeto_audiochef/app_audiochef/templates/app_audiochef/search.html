<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados da Busca — AudioChef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Header ── */
        .header {
            width: 100%;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .header-left {
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e94560, #ff6b6b, #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header p {
            margin-top: 0.3rem;
            color: #888;
            font-size: 0.9rem;
        }

        /* ── Nav buttons ── */
        .header-nav {
            display: flex;
            gap: 0.6rem;
        }

        .btn-nav {
            padding: 0.55rem 1.3rem;
            font-size: 0.88rem;
            font-weight: 600;
            font-family: inherit;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .btn-nav:hover {
            transform: translateY(-2px);
        }

        .btn-nav--outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: #e8e8e8;
        }

        .btn-nav--outline:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.25);
        }

        /* ── Main ── */
        .main {
            width: 100%;
            max-width: 1200px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        
        /* ── Search Bar ── */
        .search-container {
            display: flex;
            width: 100%;
            gap: 0.5rem;
            margin-bottom: 1rem;
            max-width: 820px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-input {
            flex: 1;
            padding: 0.9rem 1.2rem;
            font-size: 1.05rem;
            color: #fff;
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .search-input:focus {
            border-color: #e94560;
        }

        .btn-search {
            padding: 0.9rem 1.8rem;
            font-size: 1.05rem;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, #0984e3, #74b9ff);
            box-shadow: 0 4px 20px rgba(9, 132, 227, 0.35);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(9, 132, 227, 0.5);
        }

        /* ── Title ── */
        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1rem;
        }
        .page-title span {
            color: #e94560;
        }

        /* ── Spinner ── */
        .spinner-container {
            display: flex;
            justify-content: center;
            padding: 3rem 0;
        }
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Error ── */
        .error-msg {
            display: none;
            padding: 1rem 1.5rem;
            background: rgba(233, 69, 96, 0.12);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 10px;
            color: #ff6b6b;
            font-size: 0.95rem;
            text-align: center;
        }

        /* ── Grid ── */
        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        .recipe-item {
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .recipe-item:hover {
            transform: translateY(-4px);
            border-color: rgba(233, 69, 96, 0.5);
        }

        .recipe-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .recipe-item-body {
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .recipe-item-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .recipe-item-meta {
            margin-top: auto;
            font-size: 0.85rem;
            color: #888;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.7rem; }
            .recipes-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left" onclick="window.location.href='/'">
            <h1>🍳 AudioChef</h1>
            <p>Descubra receitas aleatórias com um clique</p>
        </div>
        <nav class="header-nav">
            <a href="{% url 'home' %}" class="btn-nav btn-nav--outline">Início</a>
        </nav>
    </header>

    <main class="main">
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="O que você quer cozinhar hoje?">
            <button class="btn-search" onclick="novaBusca()">🔍 Buscar</button>
        </div>

        <h2 class="page-title" id="page-title" style="display:none;">Resultados para <span id="query-text"></span></h2>

        <div class="error-msg" id="error-msg"></div>

        <div class="spinner-container">
            <div class="spinner" id="spinner"></div>
        </div>

        <div class="recipes-grid" id="recipes-grid"></div>

    </main>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let currentQuery = urlParams.get('q');

    const searchInput = document.getElementById('search-input');
    if (currentQuery) {
        searchInput.value = currentQuery;
        buscarReceitas(currentQuery);
    }

    function novaBusca() {
        const q = searchInput.value.trim();
        if (q) {
            window.location.href = `/buscar/?q=${encodeURIComponent(q)}`;
        }
    }

    searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') novaBusca();
    });

    async function buscarReceitas(q) {
        const spinner = document.getElementById('spinner');
        const grid = document.getElementById('recipes-grid');
        const errorMsg = document.getElementById('error-msg');
        const pageTitle = document.getElementById('page-title');
        const queryText = document.getElementById('query-text');

        spinner.style.display = 'block';
        grid.innerHTML = '';
        errorMsg.style.display = 'none';
        
        queryText.textContent = `"${q}"`;
        pageTitle.style.display = 'block';

        try {
            const response = await fetch(`/api/recipes/search/?q=${encodeURIComponent(q)}`);
            if (!response.ok) throw new Error(`Erro ${response.status}`);
            const data = await response.json();

            // Typically Spoonacular returns { results: [...] } or an array directly
            let recipes = Array.isArray(data) ? data : (data.results || data.recipes || []);

            renderGrid(recipes);
        } catch (err) {
            errorMsg.textContent = '⚠️ Não foi possível buscar as receitas. Tente novamente.';
            errorMsg.style.display = 'block';
            console.error(err);
        } finally {
            spinner.style.display = 'none';
        }
    }

    function renderGrid(recipes) {
        const grid = document.getElementById('recipes-grid');
        grid.innerHTML = '';

        if (!recipes || recipes.length === 0) {
            grid.innerHTML = '<p style="color:#aaa; font-size:1.1rem;">Nenhuma receita encontrada para essa busca.</p>';
            return;
        }

        recipes.forEach(r => {
            const item = document.createElement('article');
            item.className = 'recipe-item';
            // Placeholder detail link for now
            item.onclick = () => { alert('Detalhes da receita estarão disponíveis em breve!'); };

            const imgUrl = r.image || 'https://via.placeholder.com/800x400?text=Sem+Imagem';
            const title = r.title || 'Receita';

            item.innerHTML = `
                <img src="${imgUrl}" alt="Foto da receita">
                <div class="recipe-item-body">
                    <div class="recipe-item-title">${title}</div>
                    <div class="recipe-item-meta">🔗 Ver Mais Detalhes</div>
                </div>
            `;
            grid.appendChild(item);
        });
    }
</script>
</body>
</html>
