<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioChef — Entrar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── Card container ── */
        .auth-card {
            width: 100%;
            max-width: 440px;
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Logo ── */
        .auth-logo {
            text-align: center;
            margin-bottom: 0.4rem;
            font-size: 2rem;
        }

        .auth-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e94560, #ff6b6b, #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.3rem;
        }

        .auth-subtitle {
            text-align: center;
            color: #888;
            font-size: 0.92rem;
            margin-bottom: 2rem;
        }

        /* ── Form ── */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #aaa;
            letter-spacing: 0.3px;
        }

        .form-group input {
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
            font-family: inherit;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #e8e8e8;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .form-group input:focus {
            border-color: #e94560;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.15);
        }

        .form-group input::placeholder {
            color: #555;
        }

        /* ── Button ── */
        .btn-auth {
            padding: 0.85rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, #e94560, #c23152);
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.35);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 0.5rem;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(233, 69, 96, 0.5);
        }

        .btn-auth:active {
            transform: translateY(0);
        }

        .btn-auth:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        /* ── Messages ── */
        .msg {
            display: none;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            text-align: center;
        }

        .msg--error {
            background: rgba(233, 69, 96, 0.12);
            border: 1px solid rgba(233, 69, 96, 0.3);
            color: #ff6b6b;
        }

        .msg--success {
            background: rgba(46, 213, 115, 0.12);
            border: 1px solid rgba(46, 213, 115, 0.3);
            color: #2ed573;
        }

        /* ── Footer link ── */
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #888;
        }

        .auth-footer a {
            color: #e94560;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: #ff6b6b;
        }

        /* ── Responsive ── */
        @media (max-width: 500px) {
            .auth-card {
                margin: 1rem;
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-logo">🍳</div>
        <h1 class="auth-title">AudioChef</h1>
        <p class="auth-subtitle">Entre na sua conta</p>

        <div class="msg msg--error" id="msg-error"></div>
        <div class="msg msg--success" id="msg-success"></div>

        <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-auth" id="btn-login">Entrar</button>
        </form>

        <div class="auth-footer">
            Não tem conta? <a href="{% url 'registro' %}">Criar conta</a>
        </div>
    </div>

<script>
    async function handleLogin(e) {
        e.preventDefault();

        const btn      = document.getElementById('btn-login');
        const msgError = document.getElementById('msg-error');
        const msgOk    = document.getElementById('msg-success');

        msgError.style.display = 'none';
        msgOk.style.display    = 'none';
        btn.disabled    = true;
        btn.textContent = 'Entrando…';

        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;

        try {
            const response = await fetch("{% url 'login' %}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify({ email, senha }),
            });

            const data = await response.json();

            if (response.ok) {
                msgOk.textContent = '✅ Login realizado com sucesso!';
                msgOk.style.display = 'block';
                localStorage.setItem('token', data.token);
                setTimeout(() => window.location.href = "{% url 'home' %}", 800);
            } else {
                msgError.textContent = data.erro || 'Erro ao fazer login.';
                msgError.style.display = 'block';
            }
        } catch (err) {
            msgError.textContent = '⚠️ Erro de conexão. Tente novamente.';
            msgError.style.display = 'block';
            console.error(err);
        } finally {
            btn.disabled    = false;
            btn.textContent = 'Entrar';
        }
    }

    function getCookie(name) {
        const cookies = document.cookie.split(';');
        for (let c of cookies) {
            c = c.trim();
            if (c.startsWith(name + '=')) return c.substring(name.length + 1);
        }
        return '';
    }
</script>

</body>
</html>
